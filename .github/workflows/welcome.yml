name: welcome

# Greets a contributor's FIRST issue or pull request with a pointer to the
# guidelines, so a newcomer's first interaction feels acknowledged rather than
# ignored. Comment-only — it never checks out or runs PR code.
on:
  issues:
    types: [opened]
  pull_request_target:
    types: [opened]

permissions:
  issues: write
  pull-requests: write

jobs:
  welcome:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/first-interaction@v1
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          issue-message: >
            👋 Thanks for opening your first issue in RhombusKit! A real person
            reads every one — you can expect a first response within about a
            week. If this is a bug, a minimal reproduction is the single biggest
            help. See [CONTRIBUTING.md](../blob/main/CONTRIBUTING.md) for how we
            triage and what the fast-lane vs. gated lanes mean.
          pr-message: >
            🎉 Thanks for your first pull request! Please make sure the checks
            pass and the PR template's surface-contract self-check is filled in.
            If your change touches a public export or a token, regenerate the
            snapshot as described in
            [CONTRIBUTING.md](../blob/main/CONTRIBUTING.md). We'll take a look
            soon — thank you for contributing!
