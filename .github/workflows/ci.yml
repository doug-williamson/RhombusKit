name: ci

# PR-level safety net. Until this existed, nothing ran on a pull request —
# lint/test/build only fired at release time. Every job below must be green
# before merge (configure as required checks in branch protection).
#
# API-surface enforcement (Phase 5) lives in the `build` job, which already
# builds every package's dist: token CONTRACT snapshot via verify-tokens, and
# the public-export snapshot via api-snapshot. The `a11y` job runs the Phase 4
# Playwright color-contrast pass over the showcase in both themes.

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

# A new push to a PR cancels the superseded run.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec nx run-many --target=lint --all

  typecheck:
    # nx test/build do NOT type-check spec files (isolatedModules + the lib
    # tsconfig excludes specs), so the @ts-expect-error type-fixture specs are
    # only validated by a raw tsc pass. Without this job a broken fixture is
    # green. strictTemplates is currently off, so this guards type fixtures, not
    # templates.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec tsc --noEmit -p packages/core/tsconfig.spec.json

  schematics:
    # `ng add @rhombuskit/core` is verified outside jest (the @angular-devkit
    # SchematicTestRunner breaks jest's module loading), via a tsx-run script
    # that scaffolds a real workspace and asserts the providers + ordered SCSS
    # layers + idempotency. No build step: tsx runs the schematic source and the
    # collection factory is resolved by path. Add to branch protection.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm test:schematics

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      # The `ci` configuration enables codeCoverage; core enforces a ratcheting
      # coverageThreshold in its jest.config.ts.
      - run: pnpm exec nx run-many --target=test --all --configuration=ci
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage
          path: coverage/
          if-no-files-found: ignore

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      # Full build (not affected): the api-surface + smoke jobs added in later
      # phases consume every package's dist output.
      - run: pnpm exec nx run-many --target=build --all
      - name: Verify token CONTRACT (names + snapshot)
        run: node tools/verify-tokens.mjs
      - name: Verify emitted component styles (no Sass `//` leaks)
        run: node tools/verify-component-styles.mjs
      - name: Verify public API surface (export snapshots)
        run: node tools/api-snapshot.mjs
      - name: Verify llms.txt / llms-full.txt are in sync
        run: node tools/generate-llms.mjs --check

  a11y:
    # Phase 4 (secondary): the only reliable color-contrast check. jsdom can't
    # measure contrast, so the jest-axe pass skips it; this renders the showcase
    # for real and runs axe's color-contrast rule over every page in BOTH themes,
    # asserting the token pairs clear WCAG 2.1 AA. serve-static builds the
    # production showcase, then Playwright scans it.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec playwright install --with-deps chromium
      - run: pnpm exec nx run showcase-e2e:e2e
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          if-no-files-found: ignore
