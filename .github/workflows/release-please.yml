name: release-please
on:
  push:
    branches:
      - main
permissions:
  contents: write
  pull-requests: write
jobs:
  # release-please ONLY manages the release PR (version bump + CHANGELOG).
  # Tagging, the GitHub release, and npm publish are handled by publish.yml,
  # which triggers when the release PR merges (see its paths filter). We skip
  # release-please's github-release step because its finalize cannot round-trip
  # this single root package's component, which silently blocked every release.
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v4
        with:
          # Prefer a PAT / GitHub-App token so the release PR triggers CI. PRs
          # opened with the built-in GITHUB_TOKEN do NOT trigger `pull_request`
          # workflows (anti-recursion), leaving the required checks unreported and
          # forcing an admin merge. Falls back to GITHUB_TOKEN when the secret is
          # unset, so this is a no-op until RELEASE_PLEASE_TOKEN is configured.
          token: ${{ secrets.RELEASE_PLEASE_TOKEN || secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
          skip-github-release: true
