name: 🐞 Bug report
description: Something in a @rhombuskit/* package isn't working as documented.
title: "[Bug]: "
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for filing a bug. A **minimal reproduction** is the single biggest
        thing that gets a bug fixed quickly — issues without one may be labelled
        `needs-reproduction` and closed if we can't reproduce them.
  - type: dropdown
    id: package
    attributes:
      label: Which package?
      description: The package the bug lives in.
      options:
        - "@rhombuskit/core"
        - "@rhombuskit/tokens"
        - "@rhombuskit/theme-engine"
        - "@rhombuskit/material-preset"
        - "Multiple / not sure"
    validations:
      required: true
  - type: dropdown
    id: component
    attributes:
      label: Which component or area?
      options:
        - Alert
        - App shell
        - Avatar
        - Badge
        - Bottom nav
        - Breadcrumbs
        - Button
        - Card
        - Checkbox
        - Chip
        - Code block
        - Confirm dialog
        - Data table
        - Dialog
        - Empty state
        - Icon
        - Input
        - Menu
        - Overflow menu
        - Page header
        - Pagination
        - Popover
        - Progress / Spinner
        - Radio
        - Select
        - Switch
        - Tabs
        - Textarea
        - Theme toggle
        - Toast
        - Tooltip
        - Tokens / theming (not a component)
        - Multiple / not sure
    validations:
      required: true
  - type: input
    id: rk-version
    attributes:
      label: RhombusKit version
      description: Run `npm ls @rhombuskit/core` (or check package.json).
      placeholder: "1.5.0"
    validations:
      required: true
  - type: input
    id: ng-version
    attributes:
      label: Angular version
      placeholder: "21.x"
    validations:
      required: true
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: What you did, what you expected to happen, and what actually happened.
    validations:
      required: true
  - type: input
    id: repro
    attributes:
      label: Reproduction link
      description: A minimal StackBlitz or GitHub repo that reproduces the issue.
      placeholder: "https://stackblitz.com/edit/..."
    validations:
      required: false
  - type: textarea
    id: logs
    attributes:
      label: Console output / screenshots
      description: Any relevant errors or screenshots. This is rendered as code.
      render: shell
    validations:
      required: false
  - type: checkboxes
    id: checks
    attributes:
      label: Before you submit
      options:
        - label: I searched existing issues and this isn't a duplicate.
          required: true
        - label: I'm on a supported Angular version (^21).
          required: true
